display_information:
  name: Alfredo
  description: "Agent orchestrator & workflow automation for the Passione Famiglia"
features:
  bot_user:
    display_name: Alfredo
    always_online: false
  slash_commands:
    - command: /famiglia
      description: "Summon the Famiglia Status Cockpit"
      usage_hint: "[status|help]"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - reactions:write
      - files:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
