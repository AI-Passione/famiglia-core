display_information:
  name: Bella
  description: Passionate Italian secretary & project manager for the Passione Famiglia
  background_color: "#3d141e"
features:
  bot_user:
    display_name: Bella
    always_online: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - reactions:write
      - channels:read
      - groups:read
      - im:read
      - channels:manage
      - groups:write
      - users:read
  pkce_enabled: false
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_mcp_enabled: false
