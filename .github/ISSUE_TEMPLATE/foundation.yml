name: "🏗 Foundational Work"
description: "CI/CD, DevOps, Infrastructure, or Core Architectural updates."
title: "[FOUNDATION] "
labels: ["foundation", "ci/cd"]
body:
  - type: textarea
    id: objective
    attributes:
      label: "Mission Objective"
      description: "What are we building or fixing at the base layer?"
      placeholder: "Upgrade UV to 0.5.0 for better build performance."
    validations:
      required: true

  - type: textarea
    id: architectural_impact
    attributes:
      label: "Architectural Impact"
      description: "How does this change the 'skeleton' of the project? How will it affect other agents?"
      placeholder: "This will require updating all Dockerfiles..."
    validations:
      required: true

  - type: textarea
    id: verification_plan
    attributes:
      label: "Verification Plan"
      description: "How do we ensure the foundation remains solid?"
      placeholder: |
        - [ ] Verify build passes locally.
        - [ ] Run `docker-compose.prod.yml` to ensure health checks pass.
    validations:
      required: true
