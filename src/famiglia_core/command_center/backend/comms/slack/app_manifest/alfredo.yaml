display_information:
  name: Alfredo
  description: Agent orchestrator & workflow automation for the Passione Famiglia
  background_color: "#2c2e33"
features:
  bot_user:
    display_name: Alfredo
    always_online: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - reactions:write
  pkce_enabled: false
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_mcp_enabled: false
