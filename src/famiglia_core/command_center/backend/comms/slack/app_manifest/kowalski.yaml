display_information:
  name: Kowalski
  description: The Analytics & Data Science expert of the Famiglia
  background_color: "#2e2e30"
features:
  bot_user:
    display_name: Kowalski
    always_online: false
oauth_config:
  scopes:
    bot:
      - files:read
      - app_mentions:read
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - reactions:write
  pkce_enabled: false
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_mcp_enabled: false
