name: Unit Tests 🧬

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run Pytest 🧪
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository 🛒
        uses: actions/checkout@v4

      - name: Install uv 🛠️
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies 📦
        run: uv sync --all-extras --dev

      - name: Run Tests 🚀
        run: uv run pytest tests/

      - name: Build Check 📦
        run: uv build --sdist

  docker-validation:
    name: Docker Validation 🐳
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository 🛒
        uses: actions/checkout@v4

      - name: Create Dummy Env 📄
        run: touch .env

      - name: Validate Development Config 🛠️
        run: docker compose config

      - name: Validate Production Config 🚀
        run: docker compose -f docker-compose.prod.yml config

  frontend-validation:
    name: Frontend Validation 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository 🛒
        uses: actions/checkout@v4

      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/famiglia_core/command_center/frontend/package-lock.json

      - name: Install Dependencies 📦
        run: cd src/famiglia_core/command_center/frontend && npm install

      - name: Run Tests 🚀
        run: npm run test:frontend
