services:
  app:
    build: .
    image: ghcr.io/ai-passione/famiglia-core:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes: []
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - LANGFUSE_HOST=http://langfuse:3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-passione_admin}
      - DB_PASSWORD=${DB_PASSWORD:-passione_password}
      - DB_NAME=${DB_NAME:-passione_db}
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USER_SLACK_ID=${USER_SLACK_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_REMOTE_HOST=${OLLAMA_REMOTE_HOST}
      - OLLAMA_FALLBACK_MODEL=${OLLAMA_FALLBACK_MODEL:-gemma3:4b}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_ENV=${APP_ENV:-production}
      - DEV_CHANNEL_ID=${DEV_CHANNEL_ID}
      - GITHUB_APP_ID_RICCARDO=${GITHUB_APP_ID_RICCARDO}
      - GITHUB_APP_INSTALLATION_ID_RICCARDO=${GITHUB_APP_INSTALLATION_ID_RICCARDO}
      - GITHUB_APP_PRIVATE_KEY_RICCARDO=${GITHUB_APP_PRIVATE_KEY_RICCARDO}
      - GITHUB_APP_ID_ROSSINI=${GITHUB_APP_ID_ROSSINI}
      - GITHUB_APP_INSTALLATION_ID_ROSSINI=${GITHUB_APP_INSTALLATION_ID_ROSSINI}
      - GITHUB_APP_PRIVATE_KEY_ROSSINI=${GITHUB_APP_PRIVATE_KEY_ROSSINI}
      - NOTION_API_KEY_ROSSINI=${NOTION_API_KEY_ROSSINI}
      - NOTION_API_KEY_KOWALSKI=${NOTION_API_KEY_KOWALSKI}
      - AGENT_CONTEXT_ENABLED=${AGENT_CONTEXT_ENABLED:-true}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_healthy


  frontend:
    build:
      context: src/famiglia_core/command_center/frontend
      dockerfile: Dockerfile
    image: ghcr.io/ai-passione/famiglia-core-frontend:latest
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      - POSTGRES_USER=${DB_USER:-passione_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-passione_password}
      - POSTGRES_DB=${DB_NAME:-passione_db}
      - POSTGRES_MULTIPLE_DATABASES=langfuse
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/famiglia_core/db/init_multiple_dbs.sh:/docker-entrypoint-initdb.d/00_init_multiple_dbs.sh
      - ./src/famiglia_core/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/famiglia_core/db/agents/souls.sql:/docker-entrypoint-initdb.d/01_souls.sql
      - ./src/famiglia_core/db/agents/skills.sql:/docker-entrypoint-initdb.d/02_skills.sql
      - ./src/famiglia_core/db/agents/tools.sql:/docker-entrypoint-initdb.d/03_tools.sql
      - ./src/famiglia_core/db/agents/resources.sql:/docker-entrypoint-initdb.d/04_resources.sql
      - ./src/famiglia_core/db/agents/workflows.sql:/docker-entrypoint-initdb.d/05_workflows.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-passione_admin} -d ${DB_NAME:-passione_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 7.5G
        reservations:
          memory: 7G
    environment:
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_MAX_QUEUE=512
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.0.0
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    command:
      - -config.file=/etc/loki/config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./src/famiglia_core/observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./src/famiglia_core/observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.0.0
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-localhost}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./src/famiglia_core/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./src/famiglia_core/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./src/famiglia_core/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - ./src/famiglia_core/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - docker-stats-exporter

  docker-stats-exporter:
    image: wywywywy/docker_stats_exporter:latest
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  langfuse-db:
    image: postgres:15-alpine
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse-password
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-passione_admin}:${DB_PASSWORD:-passione_password}@postgres:5432/langfuse
      - NEXTAUTH_SECRET=my-secret
      - NEXTAUTH_URL=http://localhost:3001
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - SALT=${LANGFUSE_SALT:-super-secret-salt-for-local-use-only}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - PRODUCTION_DOMAIN=${PRODUCTION_DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@ai-passione.com}
    depends_on:
      frontend:
        condition: service_started

volumes:
  redis_data:
  postgres_data:
  ollama_data:
  loki_data:
  promtail_positions:
  grafana_data:
  prometheus_data:
  langfuse_db_data:
  caddy_data:
  caddy_config:
