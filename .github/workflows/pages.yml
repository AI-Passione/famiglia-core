name: Deploy Command Center Frontend

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - src/famiglia_core/command_center/frontend/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/famiglia_core/command_center/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/famiglia_core/command_center/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE != '' && vars.VITE_API_BASE || 'https://api.ai-passione.com/api/v1' }}
          VITE_BASE_PATH: ./

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/famiglia_core/command_center/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
