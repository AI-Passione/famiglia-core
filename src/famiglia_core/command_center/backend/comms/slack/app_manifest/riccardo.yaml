  description: Principal Data Engineer and DevOps master for the Passione Famiglia
  background_color: "#3b1e1e"
features:
  bot_user:
    display_name: Riccardo
    always_online: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - reactions:write
